<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jointure de tables — Grist Widget</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root {
    --blue:#2563eb;--blue-l:#eff6ff;--blue-b:#bfdbfe;
    --gray:#6b7280;--gray-l:#f9fafb;--gray-b:#e5e7eb;
    --green:#16a34a;--green-l:#f0fdf4;--green-b:#bbf7d0;
    --red:#dc2626;--red-l:#fef2f2;--red-b:#fecaca;
    --text:#111827;--muted:#6b7280;
    --r:8px;--rs:5px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:var(--text);background:#fff;}
  #app{display:flex;flex-direction:column;height:100vh;}

  .tabs{display:flex;border-bottom:1px solid var(--gray-b);background:var(--gray-l);}
  .tab{padding:10px 18px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500;background:#fff;}

  .panel{display:none;flex:1;overflow-y:auto;padding:16px;}
  .panel.active{display:block;}

  .card{border:1px solid var(--gray-b);border-radius:var(--r);padding:14px;margin-bottom:12px;background:#fff;}
  .card-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .card-title{font-weight:500;font-size:13px;color:var(--text);}

  label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
  select,input[type=text]{width:100%;padding:7px 10px;border:1px solid var(--gray-b);border-radius:var(--rs);font-size:13px;color:var(--text);background:#fff;}
  select:focus,input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.1);}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .g3{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;}

  .btn{padding:7px 14px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--gray-b);background:#fff;color:var(--text);}
  .btn:hover{background:var(--gray-l);}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn-primary:hover{background:#1d4ed8;}
  .btn-success{background:var(--green);color:#fff;border-color:var(--green);}
  .btn-success:hover{background:#15803d;}
  .btn-danger{background:var(--red-l);color:var(--red);border-color:var(--red-b);}
  .btn-danger:hover{background:#fee2e2;}
  .btn-sm{padding:4px 10px;font-size:12px;}
  .btn-icon{padding:3px 7px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--muted);}
  .btn-icon:hover{color:var(--red);}
  .btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}

  /* JOIN BLOCK */
  .join-block{position:relative;border:1px solid var(--gray-b);border-radius:var(--r);padding:14px;margin-bottom:8px;background:#fff;}
  .join-block-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .join-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex:none;}
  .join-remove{margin-left:auto;padding:3px 8px;font-size:12px;border:1px solid var(--red-b);border-radius:var(--rs);background:var(--red-l);color:var(--red);cursor:pointer;}
  .join-remove:hover{background:#fee2e2;}

  .join-connector{display:flex;align-items:center;gap:10px;margin:0 0 8px 20px;}
  .join-line{width:2px;height:28px;background:var(--gray-b);border-radius:2px;}
  .join-type-sel{width:auto;padding:3px 8px;font-size:11px;border:1px solid var(--gray-b);border-radius:var(--rs);}

  .col-head{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:4px;}
  .col-head span{font-size:11px;color:var(--muted);}
  .col-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;margin-bottom:6px;}

  .status{padding:8px 12px;border-radius:var(--rs);font-size:12px;margin-bottom:10px;}
  .s-info{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b);}
  .s-ok{background:var(--green-l);color:var(--green);border:1px solid var(--green-b);}
  .s-warn{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;}
  .s-err{background:var(--red-l);color:var(--red);border:1px solid var(--red-b);}

  .preview-wrap{overflow-x:auto;border:1px solid var(--gray-b);border-radius:var(--r);}
  table.pv{width:100%;border-collapse:collapse;font-size:12px;}
  table.pv th{background:var(--gray-l);padding:7px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--gray-b);white-space:nowrap;}
  table.pv td{padding:6px 10px;border-bottom:1px solid #f3f4f6;}
  table.pv tr:last-child td{border-bottom:none;}
  table.pv td.empty{color:#d1d5db;font-style:italic;}

  .palette{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
  .swatch{width:16px;height:16px;border-radius:3px;}

  #loading{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);gap:8px;}
  .spin{width:18px;height:18px;border:2px solid var(--gray-b);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}

  hr.div{border:none;border-top:1px solid var(--gray-b);margin:12px 0;}
  .mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;background:var(--gray-l);padding:2px 6px;border-radius:4px;}
  .small{font-size:11px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div>Connexion à Grist…</div>

<div id="app" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('config')">Configuration</div>
    <div class="tab" onclick="switchTab('preview')">Aperçu</div>
    <div class="tab" onclick="switchTab('apply')">Appliquer</div>
  </div>

  <!-- CONFIG -->
  <div class="panel active" id="tab-config">
    <div class="card" id="card-main">
      <div class="card-head">
        <div class="join-num" style="background:#eff6ff;color:#2563eb">A</div>
        <span class="card-title">Table principale</span>
      </div>
      <div>
        <label>Table</label>
        <select id="sel-tableA" onchange="onTableAChange()"></select>
      </div>
    </div>

    <div id="joins-container"></div>

    <div class="btn-row">
      <button class="btn btn-sm btn-primary" onclick="addJoin()">+ Ajouter une jointure</button>
      <button class="btn btn-sm" onclick="switchTab('preview'); renderPreview()">Aperçu →</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="panel" id="tab-preview">
    <div id="prev-status" class="status s-info">Configurez les tables puis lancez l'aperçu.</div>
    <div id="prev-container"></div>
  </div>

  <!-- APPLY -->
  <div class="panel" id="tab-apply">
    <div class="card">
      <div class="card-title" style="margin-bottom:12px">
        Colonnes à créer dans <span id="apply-tname" style="color:var(--blue)">—</span>
      </div>
      <div id="apply-list"></div>
      <div id="apply-status"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-success" onclick="applyJoins()">Créer les colonnes dans Grist</button>
      </div>
      <p class="small">Les colonnes déjà existantes seront ignorées.</p>
    </div>
  </div>
</div>

<script>
// ── PALETTE ──────────────────────────────────────────────────────
const COLORS = [
  {bg:'#f0fdf4',fg:'#16a34a',border:'#bbf7d0',label:'B'},
  {bg:'#fff7ed',fg:'#ea580c',border:'#fed7aa',label:'C'},
  {bg:'#fdf4ff',fg:'#9333ea',border:'#e9d5ff',label:'D'},
  {bg:'#fefce8',fg:'#ca8a04',border:'#fde68a',label:'E'},
  {bg:'#f0f9ff',fg:'#0284c7',border:'#bae6fd',label:'F'},
  {bg:'#fff1f2',fg:'#e11d48',border:'#fecdd3',label:'G'},
  {bg:'#f5f3ff',fg:'#7c3aed',border:'#ddd6fe',label:'H'},
  {bg:'#ecfdf5',fg:'#059669',border:'#a7f3d0',label:'I'},
];

// ── STATE ────────────────────────────────────────────────────────
const state = {
  tables: {},
  tableNames: [],
  // joins: array of { tableKey, keyInMain, keyInJoin, joinType, cols:[{src,dest}] }
  joins: [],
};

// ── PERSISTENCE ──────────────────────────────────────────────────
async function saveConfig() {
  try {
    const cfg = {
      tableA: document.getElementById('sel-tableA').value,
      joins: state.joins.map(j => ({
        tableKey: document.getElementById('sel-table-'+j.id)?.value,
        keyInMain: document.getElementById('sel-keyMain-'+j.id)?.value,
        keyInJoin: document.getElementById('sel-keyJoin-'+j.id)?.value,
        joinType:  document.getElementById('sel-jtype-'+j.id)?.value,
        cols: j.cols,
      })),
    };
    await grist.setOption('joinConfigV2', JSON.stringify(cfg));
  } catch(e) {}
}

async function loadConfig() {
  try {
    const raw = await grist.getOption('joinConfigV2');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function applyConfig(cfg) {
  if (!cfg) return;
  const setVal = (id, val) => {
    const el = document.getElementById(id);
    if (!el || val === undefined) return;
    if ([...el.options].some(o => o.value === val)) el.value = val;
  };
  setVal('sel-tableA', cfg.tableA);
  onTableAChange(true);
  state.joins = [];
  document.getElementById('joins-container').innerHTML = '';
  (cfg.joins || []).forEach(j => {
    const id = addJoin(true);
    setVal('sel-table-'+id, j.tableKey);
    onJoinTableChange(id, true);
    setVal('sel-keyMain-'+id, j.keyInMain);
    setVal('sel-keyJoin-'+id, j.keyInJoin);
    if (j.joinType) document.getElementById('sel-jtype-'+id).value = j.joinType;
    const jObj = state.joins.find(x => x.id === id);
    if (jObj && j.cols?.length) { jObj.cols = j.cols; renderColRows(id); }
  });
}

// ── GRIST INIT ───────────────────────────────────────────────────
grist.ready({ requiredAccess: 'full' });
grist.on('message', async () => { await init(); });

// Fallback: initialize directly if grist message never fires (e.g. outside iframe)
let _inited = false;
async function initOnce() {
  if (_inited) return;
  _inited = true;
  await init();
}
// Try after short delay in case grist message fires first
setTimeout(initOnce, 800);

async function init() {
  try {
    let tables = [];
    try {
      tables = await grist.docApi.listTables();
      state.tableNames = tables;
      for (const t of tables) {
        const rows = await grist.docApi.fetchTable(t);
        state.tables[t] = Object.keys(rows).filter(k => !k.startsWith('gristHelper') && k !== 'manualSort');
      }
    } catch(e) {
      // Not connected to Grist yet — show UI anyway so user can see the widget
      state.tableNames = [];
      state.tables = {};
    }
    populateMainSelect();
    let saved = null;
    try { saved = await loadConfig(); } catch(e) {}
    if (saved) { applyConfig(saved); }
    else { addJoin(); }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--red);text-align:center;padding:20px">Erreur : ${e.message}</div>`;
  }
}

// ── SELECTS ──────────────────────────────────────────────────────
function populateMainSelect() {
  const sel = document.getElementById('sel-tableA');
  sel.innerHTML = state.tableNames.map(n => `<option value="${n}">${n}</option>`).join('');
}

function fillSelect(id, cols, currentVal) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = cols.map(c => `<option value="${c}">${c}</option>`).join('');
  if (currentVal && [...el.options].some(o => o.value === currentVal)) el.value = currentVal;
}

function onTableAChange(silent) {
  // nothing extra needed for main table — keys are populated per join
  if (!silent) saveConfig();
}

function onJoinTableChange(id, silent) {
  const t = document.getElementById('sel-table-'+id)?.value;
  if (!t) return;
  const mainCols = state.tables[document.getElementById('sel-tableA').value] || [];
  const joinCols = state.tables[t] || [];
  fillSelect('sel-keyMain-'+id, mainCols);
  fillSelect('sel-keyJoin-'+id, joinCols);
  renderColRows(id);
  if (!silent) saveConfig();
}

// ── JOIN BLOCKS ──────────────────────────────────────────────────
let _jid = 0;
function addJoin(silent) {
  const id = ++_jid;
  const colorIdx = (state.joins.length) % COLORS.length;
  const color = COLORS[colorIdx];
  state.joins.push({ id, cols: [{ src: '', dest: '' }], colorIdx });

  const mainTable = document.getElementById('sel-tableA').value;
  const mainCols = state.tables[mainTable] || [];
  const tableOptions = state.tableNames.map(n => `<option value="${n}">${n}</option>`).join('');
  const colOptions = mainCols.map(c => `<option value="${c}">${c}</option>`).join('');

  const html = `
  <div class="join-connector" id="conn-${id}">
    <div class="join-line"></div>
    <select class="join-type-sel" id="sel-jtype-${id}" onchange="saveConfig()">
      <option value="left">LEFT JOIN</option>
      <option value="inner">INNER JOIN</option>
    </select>
  </div>
  <div class="join-block" id="jblock-${id}">
    <div class="join-block-head">
      <div class="join-num" style="background:${color.bg};color:${color.fg};border:1px solid ${color.border}">${color.label}</div>
      <span class="card-title">Jointure ${state.joins.length}</span>
      <button class="join-remove" onclick="removeJoin(${id})">Supprimer</button>
    </div>
    <div class="g2" style="margin-bottom:10px">
      <div>
        <label>Table à joindre</label>
        <select id="sel-table-${id}" onchange="onJoinTableChange(${id})">${tableOptions}</select>
      </div>
      <div>
        <label>Clé dans la table principale</label>
        <select id="sel-keyMain-${id}" onchange="saveConfig()">${colOptions}</select>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <label>Clé dans cette table</label>
      <select id="sel-keyJoin-${id}" onchange="saveConfig()"></select>
    </div>
    <hr class="div">
    <div class="card-title" style="margin-bottom:8px">Colonnes à récupérer</div>
    <div class="col-head"><span>Colonne source</span><span>Nom dans table principale</span><span></span></div>
    <div id="colrows-${id}"></div>
    <button class="btn btn-sm" onclick="addColRow(${id})">+ Colonne</button>
  </div>`;

  document.getElementById('joins-container').insertAdjacentHTML('beforeend', html);
  onJoinTableChange(id, true);
  if (!silent) saveConfig();
  return id;
}

function removeJoin(id) {
  state.joins = state.joins.filter(j => j.id !== id);
  document.getElementById('jblock-'+id)?.remove();
  document.getElementById('conn-'+id)?.remove();
  // Re-label remaining joins
  state.joins.forEach((j, i) => {
    const head = document.querySelector(`#jblock-${j.id} .card-title`);
    if (head) head.textContent = `Jointure ${i+1}`;
  });
  saveConfig();
}

// ── COL ROWS ─────────────────────────────────────────────────────
function addColRow(id) {
  const j = state.joins.find(x => x.id === id);
  if (!j) return;
  j.cols.push({ src: '', dest: '' });
  renderColRows(id);
  saveConfig();
}

function removeColRow(id, i) {
  const j = state.joins.find(x => x.id === id);
  if (!j) return;
  j.cols.splice(i, 1);
  renderColRows(id);
  saveConfig();
}

function renderColRows(id) {
  const j = state.joins.find(x => x.id === id);
  const container = document.getElementById('colrows-'+id);
  if (!j || !container) return;
  const tname = document.getElementById('sel-table-'+id)?.value;
  const cols = state.tables[tname] || [];
  container.innerHTML = j.cols.map((row, i) => `
    <div class="col-row">
      <select onchange="state.joins.find(x=>x.id===${id}).cols[${i}].src=this.value;saveConfig()">
        <option value="">— choisir —</option>
        ${cols.map(c => `<option value="${c}"${row.src===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <input type="text" placeholder="nom_dans_principale" value="${row.dest}"
        oninput="state.joins.find(x=>x.id===${id}).cols[${i}].dest=this.value;saveConfig()" />
      <button class="btn-icon" onclick="removeColRow(${id},${i})">✕</button>
    </div>`).join('');
}

// ── TABS ─────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['config','preview','apply'][i]===name));
  document.querySelectorAll('.panel').forEach((p,i) =>
    p.classList.toggle('active', ['tab-config','tab-preview','tab-apply'][i]==='tab-'+name));
  if (name==='preview') renderPreview();
  if (name==='apply') renderApply();
}

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchTableData(tableName) {
  const raw = await grist.docApi.fetchTable(tableName);
  const cols = Object.keys(raw).filter(k => !k.startsWith('gristHelper') && k !== 'manualSort');
  const len = raw[cols[0]]?.length || 0;
  return Array.from({length:len}, (_,i) => Object.fromEntries(cols.map(c => [c, raw[c][i]])));
}

// ── PREVIEW ──────────────────────────────────────────────────────
async function renderPreview() {
  const statusEl = document.getElementById('prev-status');
  const container = document.getElementById('prev-container');
  statusEl.className = 'status s-info';
  statusEl.textContent = 'Chargement…';
  container.innerHTML = '';

  const tA = document.getElementById('sel-tableA').value;
  if (!tA || !state.joins.length) {
    statusEl.textContent = 'Ajoutez au moins une jointure.'; return;
  }

  try {
    const rowsA = await fetchTableData(tA);
    const colsA = Object.keys(rowsA[0] || {});

    // Build maps for each join
    const maps = [];
    for (const j of state.joins) {
      const tJ = document.getElementById('sel-table-'+j.id)?.value;
      const kJ = document.getElementById('sel-keyJoin-'+j.id)?.value;
      const rows = await fetchTableData(tJ);
      const map = {};
      rows.forEach(r => { if (r[kJ] !== undefined) map[r[kJ]] = r; });
      maps.push({ j, map, tJ, kJ });
    }

    let matched = 0, unmatched = 0;
    const joined = [];

    for (const rowA of rowsA.slice(0,50)) {
      let skip = false;
      for (const {j, map} of maps) {
        const kM = document.getElementById('sel-keyMain-'+j.id)?.value;
        const jt = document.getElementById('sel-jtype-'+j.id)?.value;
        if (!map[rowA[kM]] && jt === 'inner') { skip = true; break; }
      }
      if (skip) { unmatched++; continue; }
      matched++;
      const out = {};
      colsA.forEach(c => out[c] = rowA[c]);
      maps.forEach(({j, map, tJ}) => {
        const kM = document.getElementById('sel-keyMain-'+j.id)?.value;
        const found = map[rowA[kM]];
        j.cols.filter(c=>c.src).forEach(({src,dest}) => {
          out[`__j${j.id}__`+(dest||src)] = found ? found[src] : null;
        });
      });
      joined.push(out);
    }

    const activeCols = maps.flatMap(({j,tJ}) =>
      j.cols.filter(c=>c.src).map(({src,dest}) => ({
        key:`__j${j.id}__`+(dest||src), label:dest||src, from:tJ, colorIdx:j.colorIdx
      }))
    );

    if (!activeCols.length) {
      statusEl.className='status s-warn';
      statusEl.textContent='Ajoutez des colonnes à récupérer dans la configuration.'; return;
    }

    statusEl.className='status s-ok';
    statusEl.textContent=`${matched} ligne(s) · ${unmatched ? unmatched+' exclue(s) (INNER JOIN) · ':''} Aperçu limité à 50 lignes`;

    const headA = colsA.map(c=>`<th style="background:#eff6ff;color:#2563eb">${c}</th>`).join('');
    const headJ = activeCols.map(({label,from,colorIdx})=>{
      const c=COLORS[colorIdx%COLORS.length];
      return `<th style="background:${c.bg};color:${c.fg}">${label}<br><span style="font-weight:400;font-size:10px;opacity:.7">← ${from}</span></th>`;
    }).join('');

    const bodyRows = joined.map(row=>{
      const tda = colsA.map(c=>`<td>${row[c]??''}</td>`).join('');
      const tdj = activeCols.map(({key})=>{
        const v=row[key];
        return v!==null&&v!==undefined?`<td>${v}</td>`:`<td class="empty">—</td>`;
      }).join('');
      return `<tr>${tda}${tdj}</tr>`;
    }).join('');

    container.innerHTML=`<div class="preview-wrap"><table class="pv">
      <thead><tr>${headA}${headJ}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table></div>`;

  } catch(e) {
    statusEl.className='status s-err';
    statusEl.textContent='Erreur : '+e.message;
  }
}

// ── APPLY ─────────────────────────────────────────────────────────
function renderApply() {
  const tA = document.getElementById('sel-tableA').value;
  document.getElementById('apply-tname').textContent = tA;
  let html = '';
  state.joins.forEach(j => {
    const tJ = document.getElementById('sel-table-'+j.id)?.value || '?';
    const kM = document.getElementById('sel-keyMain-'+j.id)?.value || '?';
    const kJ = document.getElementById('sel-keyJoin-'+j.id)?.value || '?';
    const c = COLORS[j.colorIdx%COLORS.length];
    j.cols.filter(x=>x.src).forEach(({src,dest})=>{
      const name = dest||src;
      const formula = `${tJ}.lookupOne(${kJ}=$${kM}).${src}`;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f3f4f6">
        <span style="background:${c.bg};color:${c.fg};border:1px solid ${c.border};font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;flex:none">${name}</span>
        <code class="mono" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${formula}</code>
      </div>`;
    });
  });
  if (!html) html='<p class="small">Aucune colonne configurée.</p>';
  document.getElementById('apply-list').innerHTML = html;
  document.getElementById('apply-status').innerHTML = '';
}

async function applyJoins() {
  const tA = document.getElementById('sel-tableA').value;
  const existing = state.tables[tA] || [];
  const statusEl = document.getElementById('apply-status');
  statusEl.className='status s-info';
  statusEl.textContent='Création en cours…';
  let created=0, skipped=0;
  try {
    for (const j of state.joins) {
      const tJ = document.getElementById('sel-table-'+j.id)?.value;
      const kM = document.getElementById('sel-keyMain-'+j.id)?.value;
      const kJ = document.getElementById('sel-keyJoin-'+j.id)?.value;
      for (const {src,dest} of j.cols.filter(x=>x.src)) {
        const name = dest||src;
        if (existing.includes(name)) { skipped++; continue; }
        await grist.docApi.applyUserActions([
          ['AddColumn', tA, name, { type:'Any', isFormula:true, formula:`${tJ}.lookupOne(${kJ}=$${kM}).${src}` }]
        ]);
        created++;
      }
    }
    const rows = await grist.docApi.fetchTable(tA);
    state.tables[tA] = Object.keys(rows).filter(k=>!k.startsWith('gristHelper')&&k!=='manualSort');
    statusEl.className='status s-ok';
    statusEl.textContent=`${created} colonne(s) créée(s)${skipped?` · ${skipped} ignorée(s) (déjà existante)`:''}`;
  } catch(e) {
    statusEl.className='status s-err';
    statusEl.textContent='Erreur : '+e.message;
  }
}
</script>
